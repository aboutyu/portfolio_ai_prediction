version: '3.8'

services:
  # Admin Service (Nest.js)
  admin:
    build:
      context: ../admin
      dockerfile: ../infra/docker/admin/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - portfolio-network

  # API Service (Nest.js)
  api:
    build:
      context: ../api
      dockerfile: ../infra/docker/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - portfolio-network

  # Web Service (Next.js)
  web:
    build:
      context: ../web
      dockerfile: ../infra/docker/web/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:3000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - portfolio-network

  # AI Service (Django)
  ai:
    build:
      context: ../ai
      dockerfile: ../infra/docker/ai/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DEBUG=False
    restart: unless-stopped
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
