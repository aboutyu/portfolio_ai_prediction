<!DOCTYPE html>
  <html lang="ko">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>서비스 점검중</title>
      <style>
          /* 전체 페이지 스타일 */
          body {
              margin: 0;
              padding: 0;
              display: flex;
              justify-content: center; /* 가로 중앙 정렬 */
              align-items: center;     /* 세로 중앙 정렬 */
              height: 100vh;           /* 화면 전체 높이 사용 */
              background-color: #f5f7fa; /* 부드러운 회색 배경 */
              font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
              color: #333;
          }

          /* 중앙 카드 박스 스타일 */
          .container {
              text-align: center;
              background: white;
              padding: 50px;
              border-radius: 15px;
              box-shadow: 0 10px 25px rgba(0,0,0,0.05); /* 부드러운 그림자 */
              max-width: 90%;
              width: 400px;
          }

          /* 아이콘 스타일 */
          .icon {
              font-size: 60px;
              margin-bottom: 20px;
              display: block;
          }

          /* 제목 스타일 */
          h1 {
              font-size: 24px;
              margin: 0 0 15px 0;
              color: #2d3436;
          }

          /* 설명 텍스트 스타일 */
          p {
              font-size: 16px;
              line-height: 1.6;
              color: #636e72;
              margin: 0;
          }
      </style>
  </head>
  <body>

      <div class="container">
          <span class="icon">🚧</span>
          
          <h1>홈페이지 공사중입니다</h1>
          
          <p>
              현재 더 나은 서비스를 제공하기 위해<br>
              시스템 점검 및 개선 작업을 진행 중입니다.
          </p>
          <p style="margin-top: 10px; font-size: 14px; color: #999;">
              이용에 불편을 드려 죄송합니다.
          </p>

      </div>

  </body>
</html>
