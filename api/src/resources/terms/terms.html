<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{terms_title}}</title>
    <style>
        /* 모바일 친화적인 기본 스타일 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", 
                         "Pretendard Variable", Pretendard, Roboto, "Noto Sans KR", 
                         "Segoe UI", "Malgun Gothic", sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            word-break: keep-all; /* 한글 줄바꿈 최적화 */
        }

        /* 헤더 스타일 */
        header {
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            color: #111;
        }

        /* 섹션 스타일 */
        section {
            margin-bottom: 40px;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            color: #222;
            margin-top: 25px;
            margin-bottom: 10px;
            border-left: 4px solid #4F46E5; /* 포인트 컬러 (인디고) */
            padding-left: 10px;
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            margin-top: 15px;
            margin-bottom: 5px;
            color: #444;
        }

        p {
            font-size: 14px;
            margin-bottom: 10px;
            color: #555;
        }

        ul, ol {
            font-size: 14px;
            color: #555;
            padding-left: 20px;
            margin-bottom: 10px;
        }

        li {
            margin-bottom: 5px;
        }

        /* 강조 스타일 */
        .highlight {
            font-weight: bold;
            text-decoration: underline;
        }

        /* 구분선 */
        hr {
            border: 0;
            height: 1px;
            background: #eee;
            margin: 40px 0;
        }

        /* 푸터 */
        footer {
            font-size: 12px;
            color: #888;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>{{title}}</h1>
    </header>

    <section>
        {{content}}
    </section>

    <footer>
        <p>시행일자: {{create_date}}</p>
    </footer>

</body>
</html>
