version: "3.9"

services:
  api:
    build:
      context: ./api
      args:
        - TARGET_ENV=production
    environment:
      - NODE_ENV=production
    container_name: api-ai-prod
    ports:
      - "3000:3000"
    env_file:
      - ./api/.env/production.env
    networks:
      - health-routine-ai
    restart: always

networks:
  health-routine-ai:
    external: true