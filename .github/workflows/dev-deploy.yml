name: Dev Branch Deploy

on:
  push:
    branches: ["dev"]

jobs:
  server-deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: SSH Remote Commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/Documents/portfolio_ai_prediction
            git pull origin dev
            docker compose up -d --build api
            # docker compose up -d --build admin
            # docker compose up -d --build web

# ---------------------------------------------------
  # Job 2: 안드로이드 APK 빌드 및 Firebase 배포 (새로 추가)
  # ---------------------------------------------------
  android-deploy:
    runs-on: ubuntu-latest
    needs: [] # server-deploy를 기다리지 않고 동시에 실행 (병렬 처리)
    
    steps:
      # 1. 소스 코드 체크아웃
      - uses: actions/checkout@v4

      # 2. Java 환경 설정 (Android 빌드 필수)
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Flutter 환경 설정
      - uses: subosito/flutter-action@v4
        with:
          channel: 'stable'
          flutter-version: '3.38.5' # 버전 변경 시 수정
          cache: true

      # 4. 패키지 의존성 설치
      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      # 5. 환경 설정 파일 생성 (중요!)
      # 보안 파일들을 Secret에서 꺼내서 실제 파일로 만듭니다.
      - name: Create Secret Files
        working-directory: ./app
        run: |
          # .development.env 파일 생성 (assets 폴더)
          mkdir -p assets/.env
          echo "${{ secrets.ENV_DEVELOPMENT_CONTENT }}" > assets/.env/.development.env

          # google-services.json 생성 (Android 폴더, Base64 디코딩)
          # 주의: Base64로 인코딩된 Secret을 다시 파일로 복원합니다.
          cd android/app
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > google-services.json

      # 6. APK 빌드
      # --dart-define=ENV=dev 옵션을 포함하여 로컬과 동일하게 빌드
      - name: Build APK
        working-directory: ./app
        run: flutter build apk --release --dart-define=ENV=dev

      # 7. Firebase App Distribution 배포
      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers # Firebase 콘솔에 설정된 테스터 그룹명
          # working-directory가 ./app이었으므로 전체 경로는 아래와 같습니다.
          file: app/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Branch: dev / Env: dev (Github Actions Auto Deploy)"
