name: Dev App Deploy (Android)

on:
  push:
    branches: ["dev"]
    paths:
      - "app/**"

jobs:
  android-deploy:
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Create Secret Files
        working-directory: ./app
        env:
          # Secretмқ„ нҷҳкІҪліҖмҲҳлЎң мЈјмһ…
          ENV_DATA: ${{ secrets.ENV_DEVELOPMENT_CONTENT }}
          JSON_DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # [л””лІ„к№…] Secretмқҙ л“Өм–ҙмҷ”лҠ”м§Җ кёёмқҙл§Ң нҷ•мқё (лӮҙмҡ©мқҖ ліҙм•ҲмғҒ ***лЎң лӮҳмҳҙ)
          echo "Checking Secret Exists..."
          if [ -z "$ENV_DATA" ]; then
            echo "вқҢ Error: ENV_DEVELOPMENT_CONTENT is empty!"
            exit 1
          else
            echo "вң… ENV_DEVELOPMENT_CONTENT found (Length: ${#JSON_DATA})"
          fi

          if [ -z "$JSON_DATA" ]; then
            echo "вқҢ Error: GOOGLE_SERVICES_JSON is empty!"
            exit 1
          else
            echo "вң… GOOGLE_SERVICES_JSON found (Length: ${#JSON_DATA})"
          fi

          # A. development.env нҢҢмқј мғқм„ұ
          mkdir -p assets/env
          echo "$ENV_DATA" > assets/env/development.env

          # V. лӮҳлЁём§Җ л№Ҳ .env нҢҢмқј мғқм„ұ
          touch assets/env/production.env
          touch assets/env/local.env

          echo "=== рҹ“Ӯ Checking Created Files ==="
          ls -R assets
          echo "================================="

          # C. google-services.json мғқм„ұ (Python мҠӨнҒ¬лҰҪнҠё мӮ¬мҡ©)
          cd android/app
          python3 -c "import os; f = open('google-services.json', 'w'); f.write(os.environ['JSON_DATA']); f.close()"

      - name: Configure Keystore
        working-directory: ./app/android
        run: |
          # 1. Secretм—җм„ң keystore нҢҢмқј ліөмӣҗ
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > app/upload-keystore.jks
          
          # 2. key.properties нҢҢмқј мғқм„ұ (Gradleмқҙ мқҪмқ„ м •ліҙ)
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> key.properties
          echo "storeFile=upload-keystore.jks" >> key.properties

      - name: Build APK
        working-directory: ./app
        run: flutter build apk --release --dart-define=ENV=dev

      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: app/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Branch: dev / Env: dev"
