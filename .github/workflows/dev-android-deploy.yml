name: App Deploy (Android)

on:
  push:
    branches: ["dev"]
    paths:
      - "app/**"

jobs:
  android-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: ./app
        run: flutter pub get

      # 5. 환경 설정 파일 생성
      - name: Create Secret Files
        working-directory: ./app
        env:
          # Secret을 환경변수로 주입
          ENV_DATA: ${{ secrets.ENV_DEVELOPMENT_CONTENT }}
          JSON_DATA: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # [디버깅] Secret이 들어왔는지 길이만 확인 (내용은 보안상 ***로 나옴)
          echo "Checking Secret Exists..."
          if [ -z "$JSON_DATA" ]; then
            echo "❌ Error: GOOGLE_SERVICES_JSON is empty!"
            exit 1
          else
            echo "✅ GOOGLE_SERVICES_JSON found (Length: ${#JSON_DATA})"
          fi

          # A. .development.env 파일 생성
          mkdir -p assets/.env
          echo "$ENV_DATA" > assets/.env/.development.env

          # B. google-services.json 생성 (Python 스크립트 사용)
          cd android/app
          python3 -c "import os; f = open('google-services.json', 'w'); f.write(os.environ['JSON_DATA']); f.close()"

      # [최종 확인] 파일 내용 출력
      - name: Debug google-services.json
        working-directory: ./app/android/app
        run: |
          echo "=== JSON FILE CONTENT START ==="
          cat google-services.json
          echo ""
          echo "=== JSON FILE CONTENT END ==="

      - name: Build APK
        working-directory: ./app
        run: flutter build apk --release --dart-define=ENV=dev

      - name: Upload to Firebase
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: app/build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Branch: dev / Env: dev"
